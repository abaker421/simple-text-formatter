<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background with rounded corners -->
  <rect width="192" height="192" rx="36" fill="#1e40af"/>
  <!-- Decorative gradient overlay -->
  <rect width="192" height="192" rx="36" fill="url(#grad)" opacity="0.4"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Bold "T" letterform -->
  <rect x="36" y="44" width="120" height="18" rx="5" fill="white" opacity="0.95"/>
  <rect x="84" y="44" width="24" height="106" rx="5" fill="white" opacity="0.95"/>
  <!-- Small sparkle dot -->
  <circle cx="148" cy="140" r="8" fill="#93c5fd" opacity="0.8"/>
</svg>
