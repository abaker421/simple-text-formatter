<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e40af">
  <title>Text Formatter</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #2d3f55;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --danger: #ef4444;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .badge {
      font-size: 0.7rem;
      background: var(--accent);
      color: white;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    /* ── Input ── */
    .input-wrap {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 14px 14px 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      line-height: 1.55;
      resize: vertical;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    .char-count {
      position: absolute;
      bottom: 10px;
      right: 12px;
      font-size: 0.72rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* ── Section labels ── */
    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin: 18px 0 8px;
      font-weight: 600;
    }

    /* ── Button group ── */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .btn {
      padding: 6px 14px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      user-select: none;
    }

    .btn:hover {
      background: var(--surface2);
      border-color: #4a6080;
    }

    .btn-danger {
      color: var(--danger);
    }

    .btn-danger:hover {
      border-color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
    }

    /* ── Result cards ── */
    .results {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      transition: border-color 0.15s;
      min-height: 46px;
    }

    .result-card:hover {
      border-color: #3a526b;
    }

    .result-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      min-width: 88px;
      flex-shrink: 0;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .result-text {
      flex: 1;
      font-size: 1rem;
      line-height: 1.5;
      word-break: break-word;
      min-height: 1.5em;
      color: var(--text);
    }

    .result-text.empty {
      color: var(--text-muted);
      font-style: italic;
      font-size: 0.85rem;
    }

    .copy-btn {
      padding: 4px 11px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.72rem;
      font-family: inherit;
      flex-shrink: 0;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      white-space: nowrap;
      user-select: none;
    }

    .copy-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .copy-btn.copied {
      background: var(--success);
      color: white;
      border-color: var(--success);
    }

    /* ── Install banner ── */
    #install-banner {
      display: none;
      margin-top: 24px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    #install-banner p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    #install-banner strong {
      color: var(--text);
    }

    .install-btn {
      padding: 7px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 600;
      flex-shrink: 0;
      transition: background 0.12s;
    }

    .install-btn:hover { background: var(--accent-hover); }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .result-label { min-width: 70px; font-size: 0.65rem; }
      .result-text { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>✦ Text Formatter</h1>
    <span class="badge">Unicode</span>
  </div>
  <p class="subtitle">Styles that copy &amp; paste across apps — Discord, Notion, Twitter, email, anywhere.</p>

  <!-- Input -->
  <div class="input-wrap">
    <textarea id="input" placeholder="Type or paste your text here…" spellcheck="true" autocorrect="on"></textarea>
    <span class="char-count" id="char-count">0</span>
  </div>

  <!-- Case tools -->
  <p class="section-label">Case &amp; Text Tools</p>
  <div class="btn-group">
    <button class="btn" onclick="applyCase('sentences')" title="Capitalize first letter of each sentence">Format Sentences</button>
    <button class="btn" onclick="applyCase('title')" title="Capitalize major words">Title Case</button>
    <button class="btn" onclick="applyCase('upper')">UPPERCASE</button>
    <button class="btn" onclick="applyCase('lower')">lowercase</button>
    <button class="btn btn-danger" onclick="clearInput()">Clear</button>
  </div>

  <!-- Unicode style outputs -->
  <p class="section-label">Unicode Styles — copy &amp; paste anywhere</p>
  <div class="results" id="results"></div>

  <!-- PWA install prompt -->
  <div id="install-banner">
    <p><strong>Install as an app</strong> — opens in its own window, works offline.</p>
    <button class="install-btn" id="install-btn">Install</button>
  </div>

</div>

<script>
  // ─────────────────────────────────────────────
  //  Unicode conversion helpers
  // ─────────────────────────────────────────────

  const cp = (n) => String.fromCodePoint(n);

  const STYLES = [
    {
      key: 'bold',
      label: 'Bold',
      fn(text) {
        return [...text].map(ch => {
          const c = ch.charCodeAt(0);
          if (ch >= 'a' && ch <= 'z') return cp(0x1D41A + c - 97);
          if (ch >= 'A' && ch <= 'Z') return cp(0x1D400 + c - 65);
          if (ch >= '0' && ch <= '9') return cp(0x1D7CE + c - 48);
          return ch;
        }).join('');
      }
    },
    {
      key: 'italic',
      label: 'Italic',
      fn(text) {
        // Lowercase h has no italic math equivalent → use ℎ (U+210E, Planck constant)
        return [...text].map(ch => {
          if (ch === 'h') return 'ℎ';
          const c = ch.charCodeAt(0);
          if (ch >= 'a' && ch <= 'z') return cp(0x1D44E + c - 97);
          if (ch >= 'A' && ch <= 'Z') return cp(0x1D434 + c - 65);
          return ch;
        }).join('');
      }
    },
    {
      key: 'boldItalic',
      label: 'Bold Italic',
      fn(text) {
        return [...text].map(ch => {
          const c = ch.charCodeAt(0);
          if (ch >= 'a' && ch <= 'z') return cp(0x1D482 + c - 97);
          if (ch >= 'A' && ch <= 'Z') return cp(0x1D468 + c - 65);
          return ch;
        }).join('');
      }
    },
    {
      key: 'underline',
      label: 'Underline',
      fn(text) {
        // Combining underline character (U+0332) appended after each character
        return [...text].map(ch => ch + '̲').join('');
      }
    },
    {
      key: 'strikethrough',
      label: 'Strikethrough',
      fn(text) {
        // Combining long stroke overlay (U+0336) appended after each character
        return [...text].map(ch => ch + '̶').join('');
      }
    }
  ];

  // ─────────────────────────────────────────────
  //  Build result cards
  // ─────────────────────────────────────────────

  const resultsEl = document.getElementById('results');

  STYLES.forEach(style => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <span class="result-label">${style.label}</span>
      <span class="result-text empty" id="out-${style.key}">type above to preview</span>
      <button class="copy-btn" data-key="${style.key}" onclick="copyStyle('${style.key}')">Copy</button>
    `;
    resultsEl.appendChild(card);
  });

  // ─────────────────────────────────────────────
  //  Live update on input
  // ─────────────────────────────────────────────

  const inputEl = document.getElementById('input');
  const charCountEl = document.getElementById('char-count');

  inputEl.addEventListener('input', updateAll);

  function updateAll() {
    const text = inputEl.value;
    charCountEl.textContent = text.length;

    STYLES.forEach(style => {
      const el = document.getElementById(`out-${style.key}`);
      if (!text.trim()) {
        el.textContent = 'type above to preview';
        el.className = 'result-text empty';
      } else {
        el.textContent = style.fn(text);
        el.className = 'result-text';
      }
    });
  }

  // ─────────────────────────────────────────────
  //  Copy to clipboard
  // ─────────────────────────────────────────────

  function copyStyle(key) {
    const el = document.getElementById(`out-${key}`);
    if (el.classList.contains('empty')) return;

    const text = el.textContent;

    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector(`[data-key="${key}"].copy-btn`);
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 1600);
    }).catch(() => {
      // Fallback for older browsers
      const range = document.createRange();
      range.selectNode(el);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      document.execCommand('copy');
      window.getSelection().removeAllRanges();
    });
  }

  // ─────────────────────────────────────────────
  //  Case / text tools (modify input text)
  // ─────────────────────────────────────────────

  function applyCase(type) {
    const text = inputEl.value;
    if (!text) return;

    const MINOR = new Set(['a','an','the','and','but','or','nor','in','on','at','to','for','of','with','by','from','as','is','are','was','were']);

    const transforms = {
      sentences: t =>
        t.toLowerCase()
          .replace(/^\s*[a-z]/, ch => ch.toUpperCase())
          .replace(/([.?!]\s+)([a-z])/g, (_, punct, ch) => punct + ch.toUpperCase()),

      title: t =>
        t.toLowerCase().replace(/\b\S+/g, (w, i) =>
          i === 0 || !MINOR.has(w) ? w[0].toUpperCase() + w.slice(1) : w
        ),

      upper: t => t.toUpperCase(),
      lower: t => t.toLowerCase()
    };

    inputEl.value = transforms[type](text);
    updateAll();
  }

  function clearInput() {
    inputEl.value = '';
    updateAll();
    inputEl.focus();
  }

  // ─────────────────────────────────────────────
  //  PWA: install prompt
  // ─────────────────────────────────────────────

  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').style.display = 'flex';
  });

  document.getElementById('install-btn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    if (outcome === 'accepted') {
      document.getElementById('install-banner').style.display = 'none';
    }
  });

  window.addEventListener('appinstalled', () => {
    document.getElementById('install-banner').style.display = 'none';
    deferredPrompt = null;
  });

  // ─────────────────────────────────────────────
  //  PWA: service worker registration
  // ─────────────────────────────────────────────

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => {
      console.warn('Service worker registration failed:', err);
    });
  }
</script>
</body>
</html>
